<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study with me</title>
    <link rel="icon" type="image/x-icon" href="/images/image.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/goodbye.css">
</head>
<body class="goodbye-page">
    <div class="goodbye-container">
        <h1 class="goodbye-title">Отличная работа!</h1>
        
        <div class="session-summary">
            <h2>Итоги сессии</h2>
            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-value" id="sessionMinutes">0</span>
                    <span class="stat-label">минут</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="completedPomodoros">0</span>
                    <span class="stat-label">помодоро</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="waterDrank">0</span>
                    <span class="stat-label">мл воды</span>
                </div>
            </div>
        </div>

        <div class="motivation-message">
            <p id="motivationText">Ваша продуктивность подросла! 🌱</p>
        </div>

        <div class="goodbye-actions">
            <button class="return-button" onclick="location.href='index.html'">
              Продолжить учиться
            </button>
            <button class="share-button" onclick="shareResults()">
              Поделиться результатами
            </button>
          </div>
          
          <div class="return-container">
            <button class="return-button" onclick="location.href='welcome.html'">
              Вернуться на главную
            </button>
          </div>
          

    <script src="js/goodbye.js"></script>
</body>
</html>
