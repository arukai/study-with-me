<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study with me</title>
    <link rel="icon" type="image/x-icon" href="/images/image.png">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">Study with me</div>
            <div class="nav-controls">
                <button id="themeToggle" class="theme-toggle">🌙</button>
            </div>
        </nav>
    </header>



    <main>

        <!-- Секция таймера -->
        <section class="timer-section">
            <div class="timer-container">
                <div class="timer-display">25:00</div>
                <div class="timer-controls">
                    <button id="startTimer" class="timer-btn">Старт</button>
                    <button id="pauseTimer" class="timer-btn" disabled>Пауза</button>
                    <button id="resetTimer" class="timer-btn">Сброс</button>
                </div>
                <div class="timer-modes">
                    <button class="mode-btn active" data-time="25">Помодоро</button>
                    <button class="mode-btn" data-time="5">Короткий перерыв</button>
                    <button class="mode-btn" data-time="15">Длинный перерыв</button>
                </div>
                <div class="custom-timer">
                    <button class="mode-btn" id="customTimerBtn">Свой таймер</button>
                    <div class="custom-timer-modal" id="customTimerModal">
                        <div class="modal-content">
                            <h3>Установить время</h3>
                            <div class="time-inputs">
                                <div class="input-group">
                                    <input type="number" id="customMinutes" min="1" max="180" value="25">
                                    <label>минут</label>
                                </div>
                                <div class="input-group">
                                    <input type="number" id="customSeconds" min="0" max="59" value="0">
                                    <label>секунд</label>
                                </div>
                            </div>
                            <div class="modal-buttons">
                                <button class="modal-btn" id="setCustomTime">Установить</button>
                                <button class="modal-btn cancel" id="cancelCustomTime">Отмена</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="toolbarWidget">
            <div class="toolbar">
                <button id="listButton">
                    <span class="list">Список задач</span>
                </button>
            </div>
            <div class="toolbar">
                <button id="calculatorButton">
                    <span class="calculator">Калькулятор</span>
                </button>
            </div>
            <div class="toolbar">
                <button id="waterTrackerButton">
                    <span class="water-tracker">Трекер воды</span>
                </button>
            </div>
        </section>

        



        <!-- Секция прогресса -->
        <section class="progress-section">
            <div class="progress-container">
                <h2>Прогресс</h2>
                <div class="stats-grid">
                    <div class="stat-card">
                        <span class="stat-value" id="totalMinutes">0</span>
                        <span class="stat-label">минут изучено</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-value" id="totalSessions">0</span>
                        <span class="stat-label">сессий завершено</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Секция трекера воды -->
        <section class="water-section">
            <div class="water-container">
                <h2>Водный баланс</h2>
                <div class="water-controls">
                    <button class="water-add" data-ml="250">+250 мл</button>
                    <button class="water-add" data-ml="500">+500 мл</button>
                    <div class="water-total" id="waterTotal">0 мл</div>
                </div>
            </div>
        </section>


  


    <div class="dark container todo-app">
        <div class="input-field">
          <textarea placeholder="Введите задачу"></textarea>
          <i class="uil uil-notes note-icon"></i>
        </div>
      
        <ul class="todoLists"></ul>
      
        <div class="pending-tasks">
          <span>Ваши ождидающие <span class="pending-num"> </span> выполнения задач.</span>
          <button class="clear-button">Очистить Всё</button>
        </div>
      </div>
      
      <div class="dark container calculator-app">
        <input type="text" class="display" />
      
        <div class="buttons">
          <button class="operator" data-value="AC">AC</button>
          <button class="operator" data-value="DEL">DEL</button>
          <button class="operator" data-value="%">%</button>
          <button class="operator" data-value="/">/</button>
      
          <button data-value="7">7</button>
          <button data-value="8">8</button>
          <button data-value="9">9</button>
          <button class="operator" data-value="*">*</button>
      
          <button data-value="4">4</button>
          <button data-value="5">5</button>
          <button data-value="6">6</button>
          <button class="operator" data-value="-">-</button>
      
          <button data-value="1">1</button>
          <button data-value="2">2</button>
          <button data-value="3">3</button>
          <button class="operator" data-value="+">+</button>
      
          <button data-value="0">0</button>
          <button data-value="00">00</button>
          <button data-value=".">.</button>
          <button class="operator" data-value="=">=</button>
        </div>
      </div>
    </main>
      
              <!-- Кнопка завершения -->
              <div class="end-session-container">
                <button id="endSession" class="end-session-btn" onclick="location.href='goodbye.html'">
                    Завершить сессию
                </button>
            </div>
            <div class="return-container">
                <button class="return-button" onclick="location.href='welcome.html'">
                    Вернуться на главную
                </button>
            </div>
      

      

    <script src="js/main.js"></script>
</body>
</html>
