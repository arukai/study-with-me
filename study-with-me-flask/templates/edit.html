{% extends 'layout.html' %}
{% block content %}
<section class="card">
  <h2 style="margin-top:0">Редактирование</h2>
  <form method="post" class="grid">
    <input name="title" value="{{ task.title }}" required />
    <textarea name="details">{{ task.details }}</textarea>

    <div class="row">
      <label>Приоритет</label>
      <select name="priority">
        {% for p in [1,2,3,4,5] %}
          <option value="{{p}}" {{ 'selected' if task.priority==p else '' }}>{{ p }}</option>
        {% endfor %}
      </select>

      <label>Дедлайн</label>
      <input type="date" name="deadline" value="{{ task.deadline or '' }}" />

      <label>Статус</label>
      <select name="status">
        <option value="todo" {{ 'selected' if task.status=='todo' else '' }}>todo</option>
        <option value="done" {{ 'selected' if task.status=='done' else '' }}>done</option>
      </select>
    </div>

    <div class="row">
      <button type="submit">Сохранить</button>
      <a class="pill" href="{{ url_for('tasks_view') }}">Назад</a>
    </div>
  </form>
</section>
{% endblock %}
