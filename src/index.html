<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study with Me</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>Study with Me</h1>
        </header>
        <main>
            <section id="timer-section">
                <h2>Таймер</h2>
                <div id="timer"></div>
                <button id="start-timer">Начать</button>
                <button id="stop-timer">Стоп</button>
            </section>
            <section id="progress-tracker-section">
                <h2>Трекер прогресса</h2>
                <div id="progress-tracker"></div>
            </section>
            <section id="chat-rooms-section">
                <h2>Чат-комнаты</h2>
                <div id="chat-rooms"></div>
            </section>
            <section id="additional-features">
                <h2>Дополнительные функции</h2>
                <div id="breathing-exercises"></div>
                <div id="stretching-exercises"></div>
                <div id="sudoku-game"></div>
            </section>
            <section id="comfort-section">
                <h2>Раздел комфорта</h2>
                <div id="background-noise"></div>
                <div id="youtube-playlist"></div>
                <div id="water-tracker"></div>
            </section>
            <section id="gamification-section">
                <h2>Геймификация</h2>
                <div id="productivity-plant"></div>
                <div id="achievements"></div>
                <div id="mini-calendar"></div>
            </section>
            <section id="settings-section">
                <h2>Настройки</h2>
                <div id="theme-settings"></div>
            </section>
        </main>
    </div>
    <script src="scripts/timer.js"></script>
    <script src="scripts/progressTracker.js"></script>
    <script src="scripts/chatRooms.js"></script>
    <script src="scripts/breathingExercises.js"></script>
    <script src="scripts/stretching.js"></script>
    <script src="scripts/sudoku.js"></script>
    <script src="scripts/waterTracker.js"></script>
    <script src="scripts/backgroundNoise.js"></script>
    <script src="scripts/youtubePlaylist.js"></script>
    <script src="scripts/productivityPlant.js"></script>
    <script src="scripts/achievements.js"></script>
    <script src="scripts/miniCalendar.js"></script>
    <script src="scripts/settings.js"></script>
</body>
</html>
